services:
  mysql:
    image: mysql:8.0
    container_name: indocor_mysql
    restart: unless-stopped
    ports:
      # Exposed directly to VPS host — no Traefik needed (no domain)
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: indocor_2026
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
      # Custom MySQL config: enforces TLS on all connections
      - ./mysql.conf.d:/etc/mysql/conf.d:ro

volumes:
  mysql_data:
